name = "sleevedpages-ingestion"
main = "src/worker.ts"
compatibility_date = "2024-11-01"

# ── Production bindings (default) ────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "sleevedpagesdb"
database_id = "42cf2813-0a3d-4d04-a67c-aff01c265bef"
migrations_dir = "db/migrations"

# Queue: orchestrator dispatches one message per group; consumers process them independently.
# Each consumer invocation handles up to 10 groups (~120 subrequests max — well within limits).
# max_concurrent_consumers = 1 keeps TCGCSV fetch rate orderly.
[[queues.producers]]
binding = "SYNC_QUEUE"
queue   = "sleevedpages-sync-queue"

[[queues.consumers]]
queue                    = "sleevedpages-sync-queue"
max_batch_size           = 10
max_batch_timeout        = 30
max_retries              = 2
max_concurrent_consumers = 1

[[r2_buckets]]
binding     = "IMAGES_BUCKET"
bucket_name = "sleeved-pages-images"

# Cron schedule:
#   0 6 * * *    — daily TCGPlayer data sync
#   0 3 * * SUN  — weekly image mirror + Scrydex set mapping
#   0 4 * * *    — DAILY Scrydex webhook drain (was */10; see below)
#
# COST CONTROL (2026-06): the price-webhook drain moved from every-10-min to ONCE DAILY.
# A day's redundant change-notifications for a volatile expansion are collapsed into ONE
# fetch per expansion (deduped in scrydexProcessor). This directly attacks the measured
# cost concentration (Pokémon = 3,426 /cards calls, ~80% of usage) without throttling any
# game. 04:00 UTC is off-peak and clear of the 06:00 TCG sync.
#
# ⚠️ FRESHNESS COUPLING: SCRYDEX_PRICE_FRESHNESS_HOURS (default 20h) MUST stay < 24h or
# each daily run no-ops against its own prior run and prices silently freeze. Do NOT raise
# it to ≥24h while this is a daily cron. (scrydexProcessor.freshnessSafeForDrain guards/warns.)
[triggers]
crons = ["0 6 * * *", "0 3 * * SUN", "0 4 * * *"]

[vars]
TCGCSV_BASE_URL = "https://tcgcsv.com"
LOG_LEVEL = "debug"
# DRY_RUN = "false"
# BACKFILL_LIMIT = "50"  # Removed — full sync is ~2,000-2,500 requests, within the 10K limit
# FORCE_SYNC = "true"      # Keep true until all sets are ingested, then remove

[dev]
port = 8788   # Use a different port from the main app (8787)

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# ── Preview / UAT bindings (non-default deployments) ─────────────────────────
# Uses the isolated UAT database so test syncs never write to production data.
# R2 images are shared (read-only reference data).
#
# Queue: the UAT worker uses the same queue by default.  If you need full queue
# isolation (e.g. to test consumer logic without affecting prod throughput),
# create a UAT queue:
#   npx wrangler queues create sleevedpages-sync-queue-uat
# Then update the queue names below to `sleevedpages-sync-queue-uat`.

[env.preview]

[[env.preview.d1_databases]]
binding = "DB"
database_name = "sleevedpagesdb-uat"
database_id = "bfb51cf2-5a64-42a3-9575-4a9fc0c38e16"

[[env.preview.queues.producers]]
binding = "SYNC_QUEUE"
queue   = "sleevedpages-sync-queue-uat"

[[env.preview.queues.consumers]]
queue                    = "sleevedpages-sync-queue-uat"
max_batch_size           = 10
max_batch_timeout        = 30
max_retries              = 2
max_concurrent_consumers = 1

[[env.preview.r2_buckets]]
binding     = "IMAGES_BUCKET"
bucket_name = "sleeved-pages-images"

# DISABLED: Scrydex crons (0 3 * * SUN, */10 * * * *) are intentionally absent from
# the UAT trigger list.  UAT card data is sourced from a weekly prod → UAT sync; running
# Scrydex API calls from UAT would burn production credits against the UAT database.
# The Content App webhook handler (/api/webhooks/scrydex) is left untouched so webhook
# delivery can be tested locally — rows just won't be processed into scrydex_prices.
# Do not add the Scrydex crons back here.
[env.preview.triggers]
crons = ["0 6 * * *"]

[env.preview.vars]
TCGCSV_BASE_URL = "https://tcgcsv.com"
LOG_LEVEL = "debug"
