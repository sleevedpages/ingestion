name = "sleevedpages-ingestion"
main = "src/worker.ts"
compatibility_date = "2024-11-01"

# ── Production bindings (default) ────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "sleevedpagesdb"
database_id = "42cf2813-0a3d-4d04-a67c-aff01c265bef"
migrations_dir = "db/migrations"

# Queue: orchestrator dispatches one message per group; consumers process them independently.
# Each consumer invocation handles up to 10 groups (~120 subrequests max — well within limits).
# max_concurrency = 1 keeps TCGCSV fetch rate orderly (one consumer invocation at a time).
[[queues.producers]]
binding = "SYNC_QUEUE"
queue   = "sleevedpages-sync-queue"

[[queues.consumers]]
queue             = "sleevedpages-sync-queue"
max_batch_size    = 10
max_batch_timeout = 30
max_retries       = 2
max_concurrency   = 1

# PriceCharting PROCESS queue: one cached-CSV window per message, self-perpetuating to EOF (the
# row offset cursor travels in the message — no KV cursor). max_batch_size=1 so each message is one
# bounded window; max_concurrency=1 caps concurrent PROCESS invocations (a category's chain is
# self-serial anyway — message N+1 doesn't exist until N completes). Create before deploy:
#   npx wrangler queues create sleevedpages-pricecharting-queue
[[queues.producers]]
binding = "PC_PROCESS_QUEUE"
queue   = "sleevedpages-pricecharting-queue"

[[queues.consumers]]
queue             = "sleevedpages-pricecharting-queue"
max_batch_size    = 1
max_batch_timeout = 5
max_retries       = 3
max_concurrency   = 1

[[r2_buckets]]
binding     = "IMAGES_BUCKET"
bucket_name = "sleeved-pages-images"

# Shared KV namespace (the Content app's SLEEVEDPAGES_KV). Caches resolved
# PriceCharting ids (pc_id:*) and raw /api/product responses (pc_product:*) so each
# card is searched once and the free-tier rate limit is respected. Same namespace id
# as Content/wrangler.toml — no new namespace, just a second binding.
[[kv_namespaces]]
binding = "SLEEVEDPAGES_KV"
id      = "d8b69df87a0143b699e8dc75d286cdcb"

# ── Worker secrets (set via `wrangler secret put <NAME>`, never committed) ─────
#   INGESTION_WORKER_SECRET — shared secret for the admin-proxied HTTP endpoints
#   SCRYDEX_API_KEY / SCRYDEX_TEAM_ID — Scrydex price/image/Vision
#   PRICECHARTING_TOKEN — PriceCharting on-demand graded + daily CSV bulk-ingest
#   TCGGO_RAPIDAPI_KEY — STILL REQUIRED: powers the Artist→Binder-Template tool
#       (/tcggo/artists, /tcggo/artists/:id/cards). Its graded eBay-sold role was
#       REMOVED (unreliable canonical-id matching); do NOT remove this key.
#   APIFY_TOKEN + APIFY_EBAY_ACTOR_ID — eBay sold-comp graded gap-filler. Confirmed
#       actor caffein.dev/ebay-sold-listings (APIFY_EBAY_ACTOR_ID = oTtB3VgfuE9GtxQt2).
#       Worker-only; admin-proxied; never in the Content app, never logged. Gated dark
#       behind the Content `ebay_graded_enabled` app_config flag.

# Cron schedule:
#   0 6 * * *    — daily TCGPlayer data sync
#   0 3 * * SUN  — weekly image mirror + Scrydex set mapping
#   0 4 * * *    — DAILY Scrydex webhook drain (was */10; see below)
#   0 5 * * *    — DAILY PriceCharting FETCH (download ONE rotated category → R2, then queue PROCESS)
#   0 7 * * *    — DAILY News poll (DotGG WordPress RSS → news_items; headline+link+date only, link-out)
#
# PRICECHARTING (FETCH/PROCESS split, rebuilt 2026-06-19): the cron FETCHes ONE rotated category's
# price-guide CSV (pokemon/magic/yugioh/one-piece-cards) → R2 (the only download; arms the 10-min
# cooldown), then the dedicated sleevedpages-pricecharting-queue PROCESSes the WHOLE category from
# that single cached file (canonical `prices`, source='pricecharting', served to ALL users for the
# 4 games). ONE download/day respects the source's ~1-per-10-min download limit (CSVs regenerate
# ~once/24h); the queue finishes even a big ~88k-row category (the old per-window re-download never
# could). 05:00 UTC is clear of the 04:00 Scrydex drain and 06:00 TCG sync. Token = PRICECHARTING_TOKEN.
# Migration 0070 created the pc-id↔canonical map; the raw CSV cache is R2 (ingest-raw/pricecharting/…),
# not D1. CREATE THE QUEUE before deploy: `wrangler queues create sleevedpages-pricecharting-queue`.
#
# COST CONTROL (2026-06): the price-webhook drain moved from every-10-min to ONCE DAILY.
# A day's redundant change-notifications for a volatile expansion are collapsed into ONE
# fetch per expansion (deduped in scrydexProcessor). This directly attacks the measured
# cost concentration (Pokémon = 3,426 /cards calls, ~80% of usage) without throttling any
# game. 04:00 UTC is off-peak and clear of the 06:00 TCG sync.
#
# ⚠️ FRESHNESS COUPLING: SCRYDEX_PRICE_FRESHNESS_HOURS (default 20h) MUST stay < 24h or
# each daily run no-ops against its own prior run and prices silently freeze. Do NOT raise
# it to ≥24h while this is a daily cron. (scrydexProcessor.freshnessSafeForDrain guards/warns.)
[triggers]
crons = ["0 6 * * *", "0 3 * * SUN", "0 4 * * *", "0 5 * * *", "0 7 * * *"]

[vars]
TCGCSV_BASE_URL = "https://tcgcsv.com"
LOG_LEVEL = "debug"
# DRY_RUN = "false"
# BACKFILL_LIMIT = "50"  # Removed — full sync is ~2,000-2,500 requests, within the 10K limit
# FORCE_SYNC = "true"      # Keep true until all sets are ingested, then remove

[dev]
port = 8788   # Use a different port from the main app (8787)

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# ── Preview / UAT bindings (non-default deployments) ─────────────────────────
# Uses the isolated UAT database so test syncs never write to production data.
# R2 images are shared (read-only reference data).
#
# Queue: the UAT worker uses the same queue by default.  If you need full queue
# isolation (e.g. to test consumer logic without affecting prod throughput),
# create a UAT queue:
#   npx wrangler queues create sleevedpages-sync-queue-uat
# Then update the queue names below to `sleevedpages-sync-queue-uat`.

[env.preview]

[[env.preview.d1_databases]]
binding = "DB"
database_name = "sleevedpagesdb-uat"
database_id = "bfb51cf2-5a64-42a3-9575-4a9fc0c38e16"

[[env.preview.queues.producers]]
binding = "SYNC_QUEUE"
queue   = "sleevedpages-sync-queue-uat"

[[env.preview.queues.consumers]]
queue             = "sleevedpages-sync-queue-uat"
max_batch_size    = 10
max_batch_timeout = 30
max_retries       = 2
max_concurrency   = 1

# PriceCharting PROCESS queue (UAT). Create before deploying preview:
#   npx wrangler queues create sleevedpages-pricecharting-queue-uat
[[env.preview.queues.producers]]
binding = "PC_PROCESS_QUEUE"
queue   = "sleevedpages-pricecharting-queue-uat"

[[env.preview.queues.consumers]]
queue             = "sleevedpages-pricecharting-queue-uat"
max_batch_size    = 1
max_batch_timeout = 5
max_retries       = 3
max_concurrency   = 1

[[env.preview.r2_buckets]]
binding     = "IMAGES_BUCKET"
bucket_name = "sleeved-pages-images"

# Shared UAT KV namespace (Content app's preview SLEEVEDPAGES_KV).
[[env.preview.kv_namespaces]]
binding = "SLEEVEDPAGES_KV"
id      = "254b9f281eae41e5a8d8e9d78d8ca98d"

# DISABLED: Scrydex crons (0 3 * * SUN, */10 * * * *) are intentionally absent from
# the UAT trigger list.  UAT card data is sourced from a weekly prod → UAT sync; running
# Scrydex API calls from UAT would burn production credits against the UAT database.
# The Content App webhook handler (/api/webhooks/scrydex) is left untouched so webhook
# delivery can be tested locally — rows just won't be processed into scrydex_prices.
# Do not add the Scrydex crons back here.
[env.preview.triggers]
crons = ["0 6 * * *"]

[env.preview.vars]
TCGCSV_BASE_URL = "https://tcgcsv.com"
LOG_LEVEL = "debug"
